<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book Store</title>
  <style>
    /* basic styles */
    body { font-family: Arial, sans-serif; }
    .book-card { border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin: 8px; width: 180px; display:inline-block; vertical-align: top; }
    .book-card img { width: 100%; height: 220px; object-fit: cover; }
    .book-title { font-size: 16px; font-weight: bold; }
    .book-author { font-size: 14px; color: #666; }
    .current-price { font-size: 14px; color: green; }
    .old-price { text-decoration: line-through; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <h1>📚 Book Store</h1>

  <!-- Category buttons -->
  <div>
    <button onclick="switchCategory('English','Fiction')">English - Fiction</button>
    <button onclick="switchCategory('English','Science')">English - Science</button>
    <button onclick="switchCategory('Bengali','উপন্যাস')">বাংলা - উপন্যাস</button>
    <button onclick="switchCategory('Bengali','কবিতা')">বাংলা - কবিতা</button>
    <button onclick="switchCategory('English','all')">English - All</button>
    <button onclick="switchCategory('Bengali','all')">বাংলা - সমস্ত</button>
    <button onclick="switchCategory('exercise','Copy')">Exercise</button>
  </div>

  <!-- Where books show -->
  <div id="book-container"></div>

  <!-- Loading overlay -->
  <div id="loading" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.3); z-index:9999;">
    <div style="padding:16px 24px; background:#fff; border-radius:10px; font-family:sans-serif; font-size:18px; font-weight:500; box-shadow:0 4px 16px rgba(0,0,0,0.2)">
      ⏳ Loading books…
    </div>
  </div>

<script>
let books = [];
let exerciseCopies = [];
const BOOKS_PER_PAGE = 50;
let visibleBookCount = BOOKS_PER_PAGE;

// Category mapping
const CATEGORY_MAP = {
  "all": { "English": "All", "Bengali": "সমস্ত" },
  "Fiction": { "English": "Fiction", "Bengali": "উপন্যাস" },
  "Science": { "English": "Science", "Bengali": "বিজ্ঞান" },
  "Poetry": { "English": "Poetry", "Bengali": "কবিতা" },
  "Technology": { "English": "Technology", "Bengali": "প্রযুক্তি" }
  // 👉 add more categories here like earlier list
};

function showLoading() {
  const el = document.getElementById('loading');
  if (el) el.style.display = 'flex';
}
function hideLoading() {
  const el = document.getElementById('loading');
  if (el) el.style.display = 'none';
}
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
  return res.json();
}

// Load books function
async function loadBooks(language, category) {
  showLoading();
  const folder = (language === "Bengali") ? "bengali books" : "english books";

  if (category === "all") {
    const categories = Object.keys(CATEGORY_MAP).filter(c => c !== "all");
    const promises = categories.map(async (c) => {
      const filename = CATEGORY_MAP[c][language] + ".json";
      const url = `./data/${folder}/${filename}`;
      try {
        return await fetchJson(url);
      } catch (err) {
        console.warn("Skipping missing file:", url);
        return [];
      }
    });
    const results = await Promise.all(promises);
    books = results.flat();
  } else {
    const filename = CATEGORY_MAP[category][language] + ".json";
    const url = `./data/${folder}/${filename}`;
    try {
      books = await fetchJson(url);
    } catch (err) {
      console.error("Error loading:", url, err);
      books = [];
    }
  }
  hideLoading();
  displayBooks(books);
}

// Load exercise copies
async function loadExercise() {
  showLoading();
  try {
    exerciseCopies = await fetchJson("./data/exercise/Copy.json");
    books = exerciseCopies.map(item => ({
      title: item.title,
      author: "",
      price: item.price,
      originalPrice: "",
      category: "Exercise",
      frontImg: item.img
    }));
  } catch (err) {
    console.error("Error loading exercise:", err);
    books = [];
  }
  hideLoading();
  displayBooks(books);
}

// Show books
function displayBooks(bookArray) {
  const container = document.getElementById("book-container");
  container.innerHTML = "";
  bookArray.slice(0, visibleBookCount).forEach(book => {
    container.innerHTML += `
      <div class="book-card">
        <img src="${book.frontImg || ''}" alt="${book.title}">
        <div class="book-title">${book.title}</div>
        <div class="book-author">${book.author || ''}</div>
        <div class="current-price">₹${book.price}</div>
        ${book.originalPrice ? `<div class="old-price">₹${book.originalPrice}</div>` : ""}
      </div>
    `;
  });
}

// Switch category/language
function switchCategory(language, category) {
  if (language === "exercise") {
    loadExercise();
  } else {
    loadBooks(language, category);
  }
}

// Init
window.onload = () => {
  switchCategory("English","Fiction"); // default load
};
</script>
</body>
</html>
